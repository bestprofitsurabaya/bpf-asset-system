version: '3.8'

services:
  bpf-asset-management:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: bpf-asset-system
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./static:/app/static
      - ./config:/app/config
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Jakarta
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - DOCKER_ENV=true
      # User credentials (ubah hash password sesuai kebutuhan)
      - BPF_USERS={"admin":{"password":"240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9","role":"admin"},"teknisi":{"password":"6ca13d52ca70c883e0f0bb101e425a89e8624de51db2d2392593af6a84118090","role":"teknisi"},"manager":{"password":"6b3a55e0261b0304143f805a24924d0c1c44524821305f31d9277843b8a0f49e","role":"manager"},"demo":{"password":"2a97516c354b68848cdbd8f54a226a0a55b21ed138e207ad6c5cbb9c00aa5aea","role":"viewer"}}
    networks:
      - bpf-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Backup service untuk backup database otomatis
  backup:
    image: alpine:latest
    container_name: bpf-backup
    restart: unless-stopped
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
    environment:
      - TZ=Asia/Jakarta
    command: |
      sh -c '
      while true; do
        echo "[$(date)] Creating backup..."
        for db in /data/*.db; do
          if [ -f "$$db" ]; then
            filename=$$(basename "$$db")
            cp "$$db" "/backups/backup_$$(date +%Y%m%d_%H%M%S)_$$filename" 2>/dev/null || true
          fi
        done
        echo "[$(date)] Cleaning old backups (>30 days)..."
        find /backups -name "backup_*.db" -mtime +30 -delete 2>/dev/null || true
        echo "[$(date)] Backup completed. Sleeping for 24 hours..."
        sleep 86400
      done'
    networks:
      - bpf-network

  # Optional: Nginx reverse proxy (untuk production dengan domain)
  nginx:
    image: nginx:alpine
    container_name: bpf-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - bpf-asset-management
    networks:
      - bpf-network
    profiles:
      - production

networks:
  bpf-network:
    driver: bridge