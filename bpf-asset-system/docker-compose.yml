services:
  bpf-asset-management:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: bpf-asset-system
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./static:/app/static
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Jakarta
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    networks:
      - bpf-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backup:
    image: alpine:latest
    container_name: bpf-backup
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./backups:/backups
    environment:
      - TZ=Asia/Jakarta
    command: |
      sh -c '
      while true; do
        cp /data/*.db /backups/backup_$$(date +%Y%m%d_%H%M%S).db 2>/dev/null || true
        find /backups -name "*.db" -mtime +30 -delete 2>/dev/null || true
        sleep 86400
      done'
    networks:
      - bpf-network

networks:
  bpf-network:
    driver: bridge